<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyntaxWear - Tenis e Sneaker Online</title>
    <meta name="description" content="SyntaxWear é a sua loja online de tênis e sneakers. Descubra os últimos lançamentos, modelos exclusivos e ofertas imperdíveis. Compre agora e transforme seu estilo com nossos produtos de alta qualidade.">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/components/header.css">
    <link rel="stylesheet" href="./css/components/hero.css">
    <link rel="stylesheet" href="./css/components/product-category.css">
    <link rel="stylesheet" href="./css/components/product-grid.css">


</head>

<body>
    <!-- Header com logo e navegação -->
    <header class="site-header">
        <!-- logo -->
        <!-- navegação principal -->
        <h1 class="logo">
            <a href="/" title="SyntaxWear  -  Tenis e Sneaker Online">
                <img src="./images/logo/logo.svg" alt="SyntaxWear  -  Tenis e Sneaker Online">

            </a>
        </h1>

        <nav class="nav-center" aria-label="Categorias Principais">
            <ul>
                <li><a href="#">Masculino</a></li>
                <li><a href="#">Feminino</a></li>
                <li><a href="#">Outlet</a></li>
            </ul>
        </nav>

        <nav class="nav-right" aria-label="Menu Secundário">
            <ul>
                <li><a href="#">Nossas lojas</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#" aria-label="Conta do usuário">
                        <img src="./images/icons/user.svg" alt="Conta do usuário">
                    </a>
                </li>
                <li><a href="#" aria-label="Ajuda">
                        <img src="./images/icons/help.svg" alt="Ajuda">
                    </a>
                </li>
                <li><a href="#" aria-label="Carrinho">
                        <img src="./images/icons/cart.svg" alt="Carrinho">
                    </a>
                </li>
            </ul>
        </nav>

    </header>

    <main>
        <!-- Seção hero -->
        <section class="hero-section">
            <!-- destaque principal com título e chamada -->
            <div class="div hero-overlay">
                <div class="hero-content">
                    <span class="hero-subtitle">Krypton One</span>
                    <h2 class="hero-title">Transforme qualquer passo em presenca.</h2>
                    <div class="hero-buttons">
                        <a class="btn btn-outline" href="#">Ver modelos</a>
                        <a class="btn btn-filled" href="#">Comprar</a>
                    </div>
                </div>
            </div>

        </section>

        <!-- Seção de categoria de tênis -->
        <section class="categories-section">
            <!-- categorias de tênis em cards ou blocos -->
                <div class="category-card casual">
                    <a href="#" class="category-link ">
                        <span class="overlay"></span>
                        <span class="category-name btn btn-outline">Casual</span>
                    </a>
                </div>

                <div class="category-card esportivo">
                    <a href="#" class="category-link ">
                        <span class="overlay"></span>
                        <span class="category-name btn btn-outline">Esportivo</span>
                    </a>
                </div>

                <div class="category-card moderno">
                    <a href="#" class="category-link ">
                        <span class="overlay"></span>
                        <span class="category-name btn btn-outline">Moderno</span>
                    </a>
                </div>

                <div class="category-card futurista">
                    <a href="#" class="category-link ">
                        <span class="overlay"></span>
                        <span class="category-name btn btn-outline">Futurista</span>
                    </a>
                </div>

        </section>

        <!-- Grid com produtos em destaque -->

        <section class="grid-section">
            <!-- produtos em destaque dispostos em grid -->
                <div class=" card top1">
                    <div class="top1-content">
                        <h3 class="card-title">Krypton One</h3>
                        <p class="card-subtitle">Estilo Urbano ccom atitude</p>
                        <div class="cta-group">
                            <a href="#" class="btn btn-outline">Feminino</a>
                            <a href="#" class="btn btn-outline">Masculino</a>
                        </div>
                    </div>
                </div>
                <div class=" card top2"></div>
                <div class=" card midL"></div>
                <div class=" card midR"></div>
                <div class=" card bottomL"></div>
                <div class=" card bottomR"></div>
        </section>
    </main>

    <!-- Footer com informações de contrato e links -->
    <footer class="site-footer">
        <!-- informações legais e links úteis -->
    </footer>
</body>

</html>
